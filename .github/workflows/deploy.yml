name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SERVER_DEPLOY_KEY }}
          known_hosts: ${{ secrets.SERVER_HOST }}

      - name: Verify deploy key
        run: ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "echo 'SSH OK'"

      # rsync 排除项说明：
      # .venv / node_modules — 开发依赖，服务器用 Docker 构建
      # .env                — 服务器已有独立配置，不覆盖
      # __pycache__ / *.pyc — 编译产物，无需同步
      # .pytest_cache       — 测试缓存
      # .ruff_cache         — lint 缓存
      # frontend/dist       — 前端构建产物，服务器重新构建
      # .git                — Git 历史，服务器不需要
      - name: Rsync to server
        run: |
          rsync -avz --delete \
            --exclude='.venv' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.pytest_cache' \
            --exclude='.ruff_cache' \
            --exclude='frontend/dist' \
            --exclude='.git' \
            ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/TravelPal/

      - name: Build & restart
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "cd ~/TravelPal && docker compose build && docker compose up -d"
