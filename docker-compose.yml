services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: travelpal-postgres
    environment:
      POSTGRES_USER: travelpal
      POSTGRES_PASSWORD: travelpal123
      POSTGRES_DB: travelpal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "travelpal"]
      interval: 5s
      timeout: 3s
      retries: 3

  redis:
    image: redis:alpine
    container_name: travelpal-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: