services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: travelpal-postgres
    environment:
      POSTGRES_USER: travelpal
      POSTGRES_PASSWORD: travelpal123
      POSTGRES_DB: travelpal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "travelpal"]
      interval: 5s
      timeout: 3s
      retries: 3

  redis:
    image: redis:alpine
    container_name: travelpal-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      args:
        PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
        PIP_TRUSTED_HOST: pypi.tuna.tsinghua.edu.cn
    container_name: travelpal-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://travelpal:travelpal123@postgres:5432/travelpal
      AMAP_API_KEY: ${AMAP_API_KEY}
      AMAP_JS_KEY: ${AMAP_JS_KEY}
      AMAP_JS_SECURITY_CODE: ${AMAP_JS_SECURITY_CODE}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL: ${LLM_MODEL}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        NPM_REGISTRY: https://registry.npmmirror.com
    container_name: travelpal-nginx
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
